<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda en Línea</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <h1>Aura - Tienda Deportiva</h1>
        <nav>
            <a href="#">Inicio</a>
            <a href="#">Catálogo</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <main class="contenedor-productos">
        <!-- Producto 1 -->
        <div class="tarjeta-producto">
            <img src="https://via.placeholder.com/150" alt="Producto">
            <h3>Playera Deportiva</h3>
            <p class="precio">$299.00</p>
            <button onclick="agregarAlCarrito('Playera Deportiva', 299)">Agregar al Carrito</button>
        </div>

        <!-- Producto 2 -->
        <div class="tarjeta-producto">
            <img src="https://via.placeholder.com/150" alt="Producto">
            <h3>Tenis Running</h3>
            <p class="precio">$1,299.00</p>
            <button onclick="agregarAlCarrito('Tenis Running', 1299)">Agregar al Carrito</button>
        </div>
    </main>

    <aside class="carrito-seccion">
        <h2>Tu Carrito</h2>
        <ul id="lista-carrito"></ul>
        <p>Total: $<span id="total-precio">0</span></p>
        <button id="btn-comprar" onclick="enviarPedidoTelegram()">Confirmar Pedido</button>
    </aside>

    <script src="script.js"></script>
</body>
</html>
